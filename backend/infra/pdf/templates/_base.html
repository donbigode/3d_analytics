<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: Helvetica, Arial, sans-serif; color: #111827; }
    .brand { background: {{ brand_color }}; color: white; padding: 12px 24px; display: flex; align-items: center; gap: 12px; }
    .brand img { height: 32px; }
    .content { padding: 24px; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid #e5e7eb; }
    .totals { margin-top: 16px; text-align: right; }
    .totals .grand { font-size: 1.4em; font-weight: bold; }
    footer { padding: 12px 24px; font-size: 0.8em; color: #6b7280; }
  </style>
</head>
<body>
  <header class="brand">
    {% if logo_url %}<img src="{{ logo_url }}" />{% endif %}
    <div>
      <div style="font-size:1.2em; font-weight:bold;">{{ business_name }}</div>
      {% if business_tagline %}<div style="font-size:0.85em;">{{ business_tagline }}</div>{% endif %}
    </div>
  </header>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
  <footer>{{ business_name }} — emitido em {{ now }}</footer>
</body>
</html>
