services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - dbdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@db:5432/app
      SESSION_SECRET: dev-secret-change-me
      WATCH_DIR: /data/watch
      STORAGE_DIR: /data/storage
      CORS_ORIGINS: "http://localhost:5173,http://localhost:8000"
      # Docker Desktop on macOS doesn't reliably forward inotify events
      # over bind mounts; polling makes uvicorn --reload work in this setup.
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app/backend
      - ./migrations:/app/migrations
      - ./pyproject.toml:/app/pyproject.toml
      - storage:/data/storage
      - watch:/data/watch
    ports:
      - "8000:8000"
    # dev: hot-reload on backend/ + migrations/ changes. In prod, override
    # this command to drop --reload.
    command: ["sh", "-c", "alembic upgrade head && uvicorn backend.app:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/backend --reload-dir /app/migrations"]

volumes:
  dbdata:
  storage:
  watch:
